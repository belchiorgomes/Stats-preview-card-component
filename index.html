<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style/style.css">
  
  <title>Frontend Mentor | Stats preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <article class="container-box">
    <figure>
      <img src="images/image-header-mobile.jpg" alt="Mulheres trabalhando em um escritório com notebooks">
    </figure>

    <div class="container-main">
      <div class="container-info">
        <h1>Get <strong>insights</strong> that help your business grow.</h1>
        <p>
          Discover the benefits of data analytics and make better decisions regarding revenue, customer
          experience, and overall efficiency.
        </p>
      </div>
      <div class="stats-list">
        <div class="stat-item">
          <dt>10k+</dt>
          <dd>companies</dd>
        </div>
        <div class="stat-item">
          <dt>314</dt>
          <dd>templates</dd>
        </div>
      
        <div class="stat-item">
          <dt>12m+</dt>
          <dd>queries</dd>
        </div>
      </div>
    </div>
  </article>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/belchiorgomes/Stats-preview-card-component" target="_blank">Breno Belchior de Freitas Gomes</a>.
  </footer>
</body>
</html>
